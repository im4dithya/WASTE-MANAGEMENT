<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Verify OTP - Waste Management System</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    :root {
        --teal: #2e7d32;
        --teal-dark: #1b5e20;
        --teal-light: #e8f5e9;
        --teal-glow: rgba(76, 175, 80, 0.3);
        --accent: #81c784;
    }

    body {
        font-family: 'Space Grotesk', sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #f0f9f0 0%, #e8f5e9 100%);
        display: flex; align-items: center;
    }

    .otp-container {
        border-radius: 25px;
        background: white;
        padding-bottom: 20px;
        border: 2px solid var(--teal-light);
        box-shadow: 0 20px 60px rgba(46, 125, 50, 0.1);
        overflow: hidden;
    }

    .otp-header {
        background: linear-gradient(135deg, var(--teal), var(--teal-dark));
        padding: 3rem 2rem;
        text-align: center;
        position: relative;
        overflow: hidden;
    }

    .otp-header::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
        animation: rotate 15s linear infinite;
    }

    @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .otp-header h2 {
        color: white;
        font-weight: 700;
        position: relative;
        z-index: 2;
    }

    .otp-header p {
        color: white;
        opacity: 0.9;
        position: relative;
        z-index: 2;
    }

    .otp-wrapper {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 1.5rem;
    }

    .otp-input {
        width: 60px;
        height: 60px;
        font-size: 1.8rem;
        font-weight: 700;
        border-radius: 15px;
        border: 2px solid #d9e2e7;
        text-align: center;
        transition: .25s;
        box-shadow: 0 6px 20px rgba(0,0,0,0.05);
        background: #f8f9fa;
    }

    .otp-input:focus {
        border-color: var(--teal);
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 8px 25px var(--teal-glow);
        outline: none;
        background: white;
    }

    .otp-input.filled {
        background: var(--teal-light);
        border-color: var(--teal-dark);
        color: var(--teal-dark);
    }

    .btn-verify {
        background: linear-gradient(135deg, var(--teal), var(--teal-dark));
        width: 100%;
        padding: 15px;
        color: white;
        border-radius: 15px;
        font-weight: 600;
        border: none;
        box-shadow: 0 10px 30px var(--teal-glow);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .btn-verify:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 35px var(--teal-glow);
    }

    .btn-verify::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        transition: left 0.6s;
    }

    .btn-verify:hover::before {
        left: 100%;
    }

    .timer {
        text-align: center;
        font-weight: 700;
        color: #dc3545;
        margin-top: 7px;
        font-size: 1.1rem;
    }

    .text-center a {
        color: var(--teal);
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s ease;
    }

    .text-center a:hover {
        color: var(--teal-dark);
        text-decoration: underline;
    }

    .otp-icon {
        font-size: 2.5rem;
        color: white;
        margin-bottom: 1rem;
        position: relative;
        z-index: 2;
    }
</style>
</head>

<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="otp-container">

                <div class="otp-header">
                    <div class="otp-icon">
                        <i class="fas fa-recycle"></i>
                    </div>
                    <h2>Verify OTP</h2>
                    <p class="text-white">EcoWaste Management System</p>
                </div>

                <form method="post" action="/otpbuttonclick" class="p-4">
                    {% csrf_token %}

                    <div class="text-center mb-4">
                        <p class="text-muted">Enter the 4-digit code sent to your email</p>
                    </div>

                    <div class="otp-wrapper">
                        <input class="otp-input" maxlength="1" id="otp1" type="text" inputmode="numeric" pattern="[0-9]">
                        <input class="otp-input" maxlength="1" id="otp2" type="text" inputmode="numeric" pattern="[0-9]">
                        <input class="otp-input" maxlength="1" id="otp3" type="text" inputmode="numeric" pattern="[0-9]">
                        <input class="otp-input" maxlength="1" id="otp4" type="text" inputmode="numeric" pattern="[0-9]">
                    </div>

                    <input type="hidden" name="textfield" id="otpFinal">

                    <button type="submit" class="btn-verify">
                        <i class="fas fa-check-circle me-2"></i>Verify Code
                    </button>

                    <div class="text-center mt-4">
                        <a href="/forgotpassword">
                            <i class="fas fa-redo me-1"></i>Resend OTP
                        </a>
                        <div class="timer" id="timer">02:00</div>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<script>
const inputs = document.querySelectorAll(".otp-input");

// Focus first input on load
window.addEventListener('load', () => {
    inputs[0].focus();
});

inputs.forEach((input, index) => {
    input.addEventListener("keyup", (e) => {
        // Allow only numbers
        if (e.key >= "0" && e.key <= "9") {
            input.classList.add("filled");
            input.value = e.key;
            if (index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        } else if (e.key === "Backspace") {
            input.classList.remove("filled");
            input.value = '';
            if (index > 0) {
                inputs[index - 1].focus();
            }
        } else if (e.key === "ArrowLeft" && index > 0) {
            inputs[index - 1].focus();
        } else if (e.key === "ArrowRight" && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
        collectOTP();
    });

    // Prevent non-numeric input
    input.addEventListener("input", (e) => {
        if (!/^\d*$/.test(e.target.value)) {
            e.target.value = e.target.value.replace(/\D/g, '');
        }
        if (e.target.value.length > 1) {
            e.target.value = e.target.value.slice(0, 1);
        }
    });
});

function collectOTP() {
    let value = "";
    inputs.forEach(input => value += input.value);
    document.getElementById("otpFinal").value = value;

    // Enable/disable submit button based on complete OTP
    const submitBtn = document.querySelector('.btn-verify');
    if (value.length === 4) {
        submitBtn.disabled = false;
        submitBtn.style.opacity = "1";
    } else {
        submitBtn.disabled = true;
        submitBtn.style.opacity = "0.7";
    }
}

// Timer with redirect
let timeLeft = 120;  // 2 minutes
const timerDisplay = document.getElementById("timer");

const countdown = setInterval(() => {
    let m = String(Math.floor(timeLeft / 60)).padStart(2, "0");
    let s = String(timeLeft % 60).padStart(2, "0");
    timerDisplay.textContent = `${m}:${s}`;
    timeLeft--;

    // Change color when less than 30 seconds
    if (timeLeft < 30) {
        timerDisplay.style.color = "#dc3545";
        timerDisplay.style.fontWeight = "800";
    }

    if (timeLeft < 0) {
        clearInterval(countdown);
        timerDisplay.textContent = "Time expired!";
        timerDisplay.style.color = "#dc3545";
        setTimeout(() => {
            window.location.href = "/forgotpassword";
        }, 1000);
    }
}, 1000);

// Initialize button state
collectOTP();
</script>

</body>
</html>
